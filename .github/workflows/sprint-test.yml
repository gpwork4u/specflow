name: Sprint Complete Test

# 當 PR merge 到 main 時觸發 — 跑該 sprint 完整 BDD 測試
# 與 pr-test.yml 不同：這層是「sprint 完整收斂」，所有 .feature scenarios 必須通過

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  check-sprint:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      sprint-ready: ${{ steps.check.outputs.ready }}
      sprint-name: ${{ steps.check.outputs.sprint_name }}
      qa-issue: ${{ steps.check.outputs.qa_issue }}
    steps:
      - name: Check if current sprint is complete
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          MILESTONE=$(gh api "repos/$REPO/milestones?state=open&sort=title&direction=asc" \
            --jq '[.[] | select(.title | startswith("Sprint"))][0]')

          if [ -z "$MILESTONE" ] || [ "$MILESTONE" = "null" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MILESTONE_TITLE=$(echo "$MILESTONE" | jq -r '.title')
          echo "sprint_name=$MILESTONE_TITLE" >> "$GITHUB_OUTPUT"

          OPEN_FEATURE=$(gh issue list --repo "$REPO" --milestone "$MILESTONE_TITLE" --label "feature" --state open --json number --jq 'length')
          OPEN_DESIGN=$(gh issue list --repo "$REPO" --milestone "$MILESTONE_TITLE" --label "design" --state open --json number --jq 'length')
          OPEN_BUGS=$(gh issue list --repo "$REPO" --milestone "$MILESTONE_TITLE" --label "bug" --state open --json number --jq 'length')
          QA_ISSUE=$(gh issue list --repo "$REPO" --milestone "$MILESTONE_TITLE" --label "qa" --state open --json number --jq '.[0].number // empty')
          echo "qa_issue=$QA_ISSUE" >> "$GITHUB_OUTPUT"

          if [ "$OPEN_FEATURE" = "0" ] && [ "$OPEN_DESIGN" = "0" ] && [ "$OPEN_BUGS" = "0" ]; then
            echo "✅ Sprint complete — triggering full test"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "Sprint not yet complete (feature=$OPEN_FEATURE design=$OPEN_DESIGN bugs=$OPEN_BUGS)"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  sprint-test:
    needs: check-sprint
    if: needs.check-sprint.outputs.sprint-ready == 'true'
    runs-on: ubuntu-latest
    env:
      SPRINT_NAME: ${{ needs.check-sprint.outputs.sprint-name }}
      QA_ISSUE: ${{ needs.check-sprint.outputs.qa-issue }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run full sprint tests (本機 + CI 共用 script)
        id: tests
        env:
          BASE_URL: http://localhost:3000
        # 不加 continue-on-error：任一階段失敗整個 job 失敗
        run: bash .claude/scripts/run-sprint-tests.sh all

      - name: Generate test report
        if: always()
        id: report
        run: |
          mkdir -p test/reports
          SPRINT_NUM=$(echo "$SPRINT_NAME" | grep -oE '[0-9]+' | head -1)
          REPORT="test/reports/sprint-${SPRINT_NUM}-test-report.md"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          OUTCOME="${{ steps.tests.outcome }}"
          VERDICT=$([ "$OUTCOME" = "success" ] && echo "✅ ALL TESTS PASSED" || echo "❌ TESTS FAILED")

          cat > "$REPORT" << EOF
          # ${SPRINT_NAME} Test Report

          - Date: ${TIMESTAMP}
          - Trigger: PR #${{ github.event.pull_request.number }} merged
          - Commit: ${{ github.sha }}
          - Result: ${VERDICT}

          See artifacts for full Playwright/Cucumber report.
          EOF
          sed -i 's/^          //' "$REPORT"
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-test-report
          path: |
            test/reports/
            test/screenshots/
          if-no-files-found: ignore

      - name: Commit test report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/reports/ || true
          git commit -m "test: ${SPRINT_NAME} test report [skip ci]" || true
          git push || true

      - name: Post result to QA issue
        if: always() && env.QA_ISSUE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$QA_ISSUE" --repo "${{ github.repository }}" --body "## 📊 Sprint 自動測試結果

          ${{ steps.report.outputs.verdict }}

          **CI Run**: [View]($RUN_URL)
          **Trigger**: PR #${{ github.event.pull_request.number }} merged"

      - name: Post result to sprint issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SPRINT_ISSUE=$(gh issue list --repo "${{ github.repository }}" \
            --label "sprint" --milestone "$SPRINT_NAME" --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$SPRINT_ISSUE" ]; then
            gh issue comment "$SPRINT_ISSUE" --repo "${{ github.repository }}" \
              --body "🤖 Sprint 自動測試 ${{ steps.report.outputs.verdict }} — [CI Run]($RUN_URL)"
          fi

      - name: Fail if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
